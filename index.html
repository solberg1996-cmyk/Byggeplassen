<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KalkyleApp</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:16px;}
.card{background:white;padding:14px;border-radius:12px;margin-bottom:12px;}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
button{background:black;color:white;border:none;}
.item{display:flex;gap:10px;margin:6px 0;align-items:center;}
small{color:#666;}
</style>
</head>

<body>

<h2>Kalkyle</h2>

<div class="card">
<label>Timer</label>
<input id="timer" type="number" value="20">

<label>Timepris</label>
<input id="timepris" type="number" value="700">

<label>Materialkost</label>
<input id="materialCost" type="number" value="0">
</div>

<div class="card">
<h3>Materialer</h3>

<input id="search" placeholder="Søk materiale...">

<div id="favorites"></div>
<div id="recent"></div>
<div id="results"></div>

</div>

<div class="card">
<div id="output"></div>
</div>

<script>

// DATA
let materialDB = [];
let recent = [];

// LAST INN CSV
function loadCSV(text){
  materialDB = [];

  text.split("\n").forEach(row=>{
    const c = row.split(";");
    if(c.length > 6){
      materialDB.push({
        item: c[0],
        name: c[1],
        regular: Number(c[4])||0,
        discount: Number(c[5])||0,
        price: Number(c[6])||0,
        unit: c[7]||"",
        favorite:false
      });
    }
  });

  render();
}

// TEST DATA (kan fjernes senere)
loadCSV(`24943144;FURU LEKT;0;0;37.95;38;9.63;LM
23359946;GRAN TREKANT;0;0;40.62;35;14.44;LM
`);

// SØK
search.oninput = ()=>{
  let q = search.value.toLowerCase();

  let res = materialDB
    .map(m=>{
      let score=0;
      if(m.item===q) score+=100;
      if(m.item.startsWith(q)) score+=50;
      if(m.name.toLowerCase().startsWith(q)) score+=30;
      if(m.name.toLowerCase().includes(q)) score+=10;
      return {...m,score};
    })
    .filter(m=>m.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);

  results.innerHTML = res.map(renderRow).join("");
};

// RENDER RAD
function renderRow(m){
  return `
  <div class="item">
    <div style="flex:1">
      <strong>${m.name}</strong><br>
      <small>
        ${m.item} • ${m.unit}<br>
        Din pris: ${m.price} kr
        ${m.regular ? " • Ord: "+m.regular+" kr" : ""}
        ${m.discount ? " • -"+m.discount+"%" : ""}
      </small>
    </div>

    <button onclick="addMaterial('${m.item}')">+</button>
    <button onclick="fav('${m.item}')">${m.favorite?'★':'☆'}</button>
  </div>`;
}

// FAVORITT
function fav(item){
  let m = materialDB.find(x=>x.item===item);
  m.favorite = !m.favorite;
  render();
}

// LEGG TIL
function addMaterial(item){
  let m = materialDB.find(x=>x.item===item);

  materialCost.value = Number(materialCost.value) + m.price;

  recent = [m,...recent.filter(x=>x.item!==item)].slice(0,5);

  calc();
  render();
}

// FAVORITTER VISNING
function renderFav(){
  let favs = materialDB.filter(m=>m.favorite);
  favorites.innerHTML = favs.length ? "<b>Favoritter</b>" + favs.map(renderRow).join("") : "";
}

// RECENT
function renderRecent(){
  recentDiv = document.getElementById("recent");
  recentDiv.innerHTML = recent.length ? "<b>Sist brukte</b>" + recent.map(renderRow).join("") : "";
}

// RENDER
function render(){
  renderFav();
  renderRecent();
}

// KALKYLE
function calc(){
  let total = timer.value * timepris.value + Number(materialCost.value);
  output.innerHTML = "Pris: " + Math.round(total) + " kr";
}

document.querySelectorAll("input").forEach(el=>el.oninput=calc);

calc();

</script>

</body>
</html>
